<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Night - TV Display</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /*tv container */
        .tv-screen {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Header */
        .tv-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .tv-title {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #3498db, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tv-controls button {
            padding: 0.5rem 1rem;
            margin-left: 0.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .tv-controls button:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Views */
        .tv-view {
            width: 100%;
            height: 100%;
            display: none;
            padding: 2rem;
            box-sizing: border-box;
        }

        .tv-view.active {
            display: flex;
            flex-direction: column;
        }

        /* Lobby View */
        .lobby-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .lobby-title {
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 0 8px 32px rgba(0,0,0,0.5);
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .lobby-subtitle {
            font-size: 1.8rem;
            color: #a0a0b0;
            margin-bottom: 3rem;
        }

        .lobby-players {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .lobby-player-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2.5rem;
            border-radius: 16px;
            min-width: 180px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.1);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lobby-player-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .lobby-player-score {
            color: #2ecc71;
            font-size: 2rem;
            font-weight: bold;
        }

        .start-game-btn {
            margin-top: 3rem;
            padding: 1.5rem 5rem;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(46, 204, 113, 0.4);
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .start-game-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 48px rgba(46, 204, 113, 0.6);
        }

        /* Question View */
        .question-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .question-counter {
            font-size: 1.5rem;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
        }

        .question-category {
            font-size: 1.5rem;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            display: inline-block;
        }

        .question-text {
            font-size: 3.5rem;
            line-height: 1.3;
            margin: 3rem 0;
            text-align: center;
        }

        .timer-container {
            margin: 3rem 0;
        }

        .timer-bar-bg {
            width: 100%;
            height: 24px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
            width: 100%;
            transition: width 1s linear;
            border-radius: 12px;
        }

        .timer-text {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            margin-top: 1rem;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-top: 2rem;
        }

        .answer-card {
            background: rgba(255,255,255,0.05);
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            font-size: 2rem;
            transition: all 0.3s ease;
            border: 3px solid rgba(255,255,255,0.1);
        }

        /* Reveal View */
        .reveal-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .reveal-title {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .correct-answer {
            font-size: 4rem;
            color: #2ecc71;
            text-align: center;
            margin: 2rem 0;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Scoreboard View */
        .scoreboard-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .scoreboard-title {
            font-size: 4rem;
            text-align: center;
            margin-bottom: 2rem;
            color: #f1c40f;
        }

        .scoreboard-list {
            flex: 1;
            overflow-y: auto;
        }

        .scoreboard-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            margin-bottom: 1rem;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 2rem;
        }

        .scoreboard-rank {
            font-size: 3rem;
            font-weight: bold;
            color: #f1c40f;
            width: 80px;
        }

        .scoreboard-rank.gold { color: #ffd700; }
        .scoreboard-rank.silver { color: #c0c0c0; }
        .scoreboard-rank.bronze { color: #cd7f32; }

        .scoreboard-name {
            flex: 1;
            font-weight: bold;
        }

        .scoreboard-score {
            font-size: 2.5rem;
            color: #2ecc71;
            font-weight: bold;
            min-width: 150px;
        }

        /* Final View */
        .final-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .winner-card {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: #000;
            padding: 4rem 5rem;
            border-radius: 24px;
            margin-bottom: 3rem;
            text-align: center;
            box-shadow: 0 16px 64px rgba(241, 196, 15, 0.5);
            animation: celebrate 1s ease infinite alternate;
            max-width: 800px;
        }

        @keyframes celebrate {
            from {
                transform: scale(1) rotate(0deg);
            }
            to {
                transform: scale(1.05) rotate(5deg);
            }
        }

        .winner-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .winner-name {
            font-size: 5rem;
            font-weight: bold;
            margin: 1rem 0;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .winner-score {
            font-size: 3rem;
        }

        .final-scoreboard {
            width: 100%;
            max-width: 1000px;
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 3rem;
        }

        .final-scoreboard-title {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 2rem;
            color: #a0a0b0;
        }

        .play-again-btn {
            margin-top: 3rem;
            padding: 1.5rem 5rem;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #3498db, #9b59b6);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(52, 152, 219, 0.4);
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .play-again-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 48px rgba(52, 152, 219, 0.6);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 1920px) {
            .lobby-title { font-size: 4rem; }
            .question-text { font-size: 3rem; }
            .answer-card { font-size: 1.8rem; }
        }

        @media (max-width: 1024px) {
            .lobby-title { font-size: 3rem; }
            .lobby-player-name { font-size: 1.2rem; }
            .question-text { font-size: 2rem; }
            .answers-grid { gap: 1rem; }
            .answer-card { font-size: 1.4rem; padding: 1.5rem; }
            .scoreboard-title { font-size: 2.5rem; }
            .scoreboard-row { font-size: 1.5rem; padding: 1rem; }
            .winner-name { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="tv-screen">
        <!-- Header -->
        <div class="tv-header">
            <div class="tv-title">
                <i class="fas fa-gamepad"></i> Trivia Night
            </div>
            <div class="tv-controls">
                <button id="start-btn" onclick="startGame()">
                    <i class="fas fa-play"></i> Start Game
                </button>
                <button id="next-btn" onclick="nextQuestion()" class="hidden">
                    <i class="fas fa-forward"></i> Next Question
                </button>
                <button id="reveal-btn" onclick="revealAnswer()" class="hidden">
                    <i class="fas fa-eye"></i> Reveal
                </button>
                <button id="scoreboard-btn" onclick="showScoreboard()" class="hidden">
                    <i class="fas fa-chart-bar"></i> Scoreboard
                </button>
                <button id="play-again-btn" onclick="resetGame()" class="hidden">
                    <i class="fas fa-redo"></i> Play Again
                </button>
            </div>
        </div>

        <!-- Lobby View -->
        <div id="view-lobby" class="tv-view active">
            <div class="lobby-content">
                <h1 class="lobby-title">Trivia Night</h1>
                <p class="lobby-subtitle">Waiting for players to join...</p>
                <div class="lobby-players" id="lobby-players">
                    <!-- Players will be added here -->
                </div>
                <button class="start-game-btn" onclick="startGame()">
                    <i class="fas fa-play"></i> START GAME
                </button>
            </div>
        </div>

        <!-- Question View -->
        <div id="view-question" class="tv-view">
            <div class="question-content">
                <div class="question-header">
                    <div class="question-counter" id="question-counter">
                        <i class="fas fa-number"></i> <span id="question-num">1</span> / <span id="total-questions">10</span>
                    </div>
                    <div class="question-category" id="question-category">
                        <i class="fas fa-tag"></i> Category
                    </div>
                </div>
                <div class="question-text" id="question-text">
                    Question goes here...
                </div>
                <div class="timer-container">
                    <div class="timer-bar-bg">
                        <div class="timer-bar-fill" id="timer-bar"></div>
                    </div>
                    <div class="timer-text">
                        <span id="timer-text">15</span>s
                    </div>
                </div>
                <div class="answers-grid" id="answers-grid">
                    <!-- Answers will be added here -->
                </div>
            </div>
        </div>

        <!-- Reveal View -->
        <div id="view-reveal" class="tv-view">
            <div class="reveal-content">
                <h2 class="reveal-title">Correct Answer</h2>
                <div class="correct-answer" id="correct-answer">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="answers-grid" id="reveal-answers">
                    <!-- Answer cards will be added here -->
                </div>
            </div>
        </div>

        <!-- Scoreboard View -->
        <div id="view-scoreboard" class="tv-view">
            <div class="scoreboard-content">
                <h2 class="scoreboard-title">
                    <i class="fas fa-trophy"></i> Scoreboard
                </h2>
                <div class="scoreboard-list" id="scoreboard-list">
                    <!-- Scores will be added here -->
                </div>
            </div>
        </div>

        <!-- Final View -->
        <div id="view-final" class="tv-view">
            <div class="final-content">
                <div class="winner-card">
                    <div class="winner-title">
                        <i class="fas fa-trophy"></i> THE WINNER IS
                    </div>
                    <div class="winner-name" id="winner-name">
                        Player Name
                    </div>
                    <div class="winner-score" id="winner-score">
                        10000 points
                    </div>
                </div>
                <div class="final-scoreboard">
                    <h3 class="final-scoreboard-title">
                        Final Standings
                    </h3>
                    <div id="final-scoreboard-list">
                        <!-- Final scores will be added here -->
                    </div>
                </div>
                <button class="play-again-btn" onclick="resetGame()">
                    <i class="fas fa-redo"></i> Play Again
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/tv.js"></script>
</body>
</html>
