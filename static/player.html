<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Trivia Night</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 0.75rem 1.5rem;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(45deg, #3498db, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #player-name-display {
            font-size: 1rem;
            color: #a0a0b0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .screen {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .hidden { display: none !important; }

        /* === NAME ENTRY === */
        .name-input {
            width: 100%;
            padding: 1.2rem;
            margin: 1.5rem 0;
            border: 3px solid #3498db;
            border-radius: 16px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1.4rem;
            text-align: center;
        }
        .name-input:focus {
            outline: none;
            border-color: #9b59b6;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.3);
        }

        .join-btn {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #3498db, #9b59b6);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }
        .join-btn:active { transform: scale(0.98); }

        #join-message {
            margin-top: 1rem;
            min-height: 1.5rem;
            font-size: 1.1rem;
        }

        /* === WAITING === */
        .waiting-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounce 1.5s ease infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .waiting-text {
            font-size: 1.4rem;
            color: #a0a0b0;
        }

        /* === GAME === */
        .game-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .game-category {
            font-size: 1rem;
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
        }
        .game-counter {
            font-size: 1rem;
            color: #a0a0b0;
        }
        .game-timer-display {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }
        .game-question {
            font-size: 1.3rem;
            line-height: 1.4;
            margin: 0.75rem 0;
            padding: 0 0.5rem;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .answer-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 1.1rem 1rem;
            border: 3px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            font-size: 1.15rem;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
            word-wrap: break-word;
        }
        .answer-btn:active:not(:disabled) {
            transform: scale(0.97);
            background: rgba(255,255,255,0.2);
        }

        /* === RESULTS (between rounds) === */
        .results-rank {
            font-size: 2rem;
            color: #a0a0b0;
            margin-bottom: 0.5rem;
        }
        .results-label {
            font-size: 1.2rem;
            color: #a0a0b0;
            margin-bottom: 0.5rem;
        }
        .results-score {
            font-size: 4rem;
            font-weight: bold;
            color: #2ecc71;
            margin: 0.5rem 0;
        }
        .results-message {
            font-size: 1.1rem;
            color: #a0a0b0;
            margin-top: 1rem;
        }

        /* Larger screens: 2-column answers */
        @media (min-width: 500px) {
            .answers-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><i class="fas fa-gamepad"></i> Trivia Night</div>
        <div id="player-name-display"></div>
    </div>

    <div class="main-content">

        <!-- Name Entry -->
        <div id="screen-name" class="screen">
            <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem;">🎮 Trivia Night</h1>
            <p style="color: #a0a0b0; margin-bottom: 1rem;">Enter your name to join!</p>
            <input type="text" id="player-name" class="name-input" placeholder="Your name..." maxlength="20" autocomplete="off">
            <button class="join-btn" id="join-btn"><i class="fas fa-paper-plane"></i> JOIN</button>
            <p id="join-message"></p>
        </div>

        <!-- Waiting -->
        <div id="screen-waiting" class="screen hidden">
            <div class="waiting-icon">⏳</div>
            <div class="waiting-text">Waiting for host to start...</div>
            <div class="waiting-text" style="color: #2ecc71; margin-top: 1rem;">You're in! 🎉</div>
        </div>

        <!-- Vote Screen -->
        <div id="screen-vote" class="screen hidden">
            <h2 style="font-size:1.8rem; margin-bottom:0.5rem;">🗳️ Block <span id="player-vote-block">1</span></h2>
            <p style="color:#a0a0b0; margin-bottom:1rem;">Tap to vote!</p>
            <div style="font-size:1.5rem; font-weight:bold; margin-bottom:1rem;" id="player-vote-timer">10s</div>
            <div id="player-vote-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;"></div>
        </div>

        <!-- Game (question + answers) -->
        <div id="screen-game" class="screen hidden">
            <div class="game-top">
                <div class="game-category" id="game-category">Category</div>
                <div class="game-counter" id="game-question-counter">1 / 10</div>
            </div>
            <div class="game-timer-display">
                <i class="fas fa-stopwatch" style="font-size: 0.7em;"></i> <span id="game-timer">15</span>s
            </div>
            <div class="game-question" id="game-question">Question text here</div>
            <div class="answers-grid" id="answers-grid"></div>
        </div>

        <!-- Results (between rounds + final) -->
        <div id="screen-results" class="screen hidden">
            <div class="results-rank" id="results-rank"></div>
            <div class="results-label">Your Score</div>
            <div class="results-score" id="results-score">0</div>
            <div class="results-message" id="results-message">Next question coming up...</div>
        </div>

    </div>

    <script src="/static/js/player.js"></script>
</body>
</html>
