<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Night - Join Game</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .join-container {
            background-color: rgba(22, 33, 62, 0.9);
            border-radius: 20px;
            padding: 3rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #3498db, #9b59b6, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #a0a0b0;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        .qr-container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            display: inline-block;
            margin: 2rem 0;
        }

        .qr-code {
            max-width: 220px;
            height: auto;
            border-radius: 8px;
        }

        .instructions {
            background: rgba(0,0,0,0.3);
            padding: 1.5rem;
            border-radius: 12px;
            margin: 2rem 0;
            text-align: left;
        }

        .instructions h3 {
            color: #3498db;
            margin-bottom: 1rem;
        }

        .instructions ul {
            margin-left: 1.5rem;
        }

        .instructions li {
            margin-bottom: 0.5rem;
            color: #a0a0b0;
        }

        .manual-url {
            font-family: monospace;
            background: rgba(0,0,0,0.4);
            padding: 1rem;
            border-radius: 8px;
            word-break: break-all;
            margin: 1rem 0;
            font-size: 1.1rem;
        }

        .player-input-container {
            margin-top: 2rem;
            border-top: 2px solid rgba(255,255,255,0.1);
            padding-top: 2rem;
        }

        .player-name-input {
            width: 100%;
            padding: 1.2rem;
            margin: 1rem 0;
            border: 2px solid #3498db;
            border-radius: 12px;
            background-color: rgba(0,0,0,0.3);
            color: white;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .player-name-input:focus {
            outline: none;
            border-color: #9b59b6;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.3);
        }

        .join-btn {
            width: 100%;
            background: linear-gradient(135deg, #3498db, #9b59b6);
            color: white;
            padding: 1.2rem;
            border: none;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .join-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.5);
        }

        .join-btn:active {
            transform: translateY(1px);
        }

        .footer {
            margin-top: 3rem;
            color: #a0a0b0;
            font-size: 0.9rem;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-message {
            color: #2ecc71;
            font-size: 1.5rem;
            margin-top: 1rem;
        }

        .error-message {
            color: #e74c3c;
            font-size: 1.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="join-container">
        <div class="logo">
            <i class="fas fa-gamepad"></i>
        </div>
        <h1>Trivia Night</h1>
        <p class="subtitle">Enter your name to join the game!</p>

        <div class="qr-container">
            <img id="qr-code" class="qr-code" alt="QR Code">
        </div>

        <div class="instructions">
            <h3>How to Play:</h3>
            <ul>
                <li>Scan the QR code or type the URL on your phone</li>
                <li>Enter your name below</li>
                <li>Wait for the host to start the game</li>
                <li>Answer 10 questions for points!</li>
            </ul>
        </div>

        <div class="manual-url" id="manual-url">Loading...</div>

        <div class="player-input-container">
            <input 
                type="text" 
                id="player-name" 
                class="player-name-input" 
                placeholder="Enter your name..."
                maxlength="20"
            >
            <button id="join-btn" class="join-btn">Join Game</button>
            <div id="status-message" class="success-message hidden"></div>
        </div>
    </div>

    <div class="footer">
        <i class="fas fa-server"></i> Powered by Trivia Night
    </div>

    <div class="loading-overlay hidden" id="loading">
        <div class="loading-spinner"></div>
        <p>Joining game...</p>
    </div>

    <script>
        // Get join URL from server
        async function fetchJoinInfo() {
            try {
                const qrResponse = await fetch('/qrcode');
                const qrData = await qrResponse.json();
                
                document.getElementById('qr-code').src = 'data:image/png;base64,' + qrData.qr_code;
                document.getElementById('manual-url').textContent = qrData.url;
                
                // Store join URL for WebSocket
                window.joinUrl = qrData.url;
            } catch (error) {
                console.error('Error fetching join info:', error);
            }
        }

        // Join game
        async function joinGame() {
            const nameInput = document.getElementById('player-name');
            const name = nameInput.value.trim();
            
            if (!name) {
                showStatus('Please enter your name!', 'error');
                return;
            }

            localStorage.setItem('playerName', name);
            showStatus(`Welcome, ${name}! Redirecting...`, 'success');
            
            setTimeout(() => {
                window.location.href = '/play';
            }, 500);
        }

        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.textContent = message;
            statusDiv.className = type === 'success' ? 'success-message' : 'error-message';
            statusDiv.classList.remove('hidden');
            
            if (type === 'error') {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            fetchJoinInfo();
            
            document.getElementById('join-btn').addEventListener('click', joinGame);
            
            document.getElementById('player-name').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    joinGame();
                }
            });
        });
    </script>
</body>
</html>
